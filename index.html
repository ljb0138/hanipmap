<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>한입지도 — 맞춤 맛집 찾기</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="wrap">
      <header>
        <div class="logo">한입<b>지도</b></div>
        <div class="location">📍 내 주변의 맞춤 맛집</div>
      </header>

      <section class="hero">
        <h1>오늘, 어디서 먹을까?</h1>
        <p>원하는 장소와 조건을 문장으로 편하게 입력해 보세요.</p>
        <form class="search" id="searchForm">
          <input id="query" aria-label="맛집 검색 조건" value="성균관대학교 명륜캠퍼스 300m 이내, 8천원 이하" />
          <button>추천받기</button>
        </form>
        <div class="chips">
          <button class="chip" data-query="혼밥하기 좋은 곳">혼밥</button>
          <button class="chip" data-query="1만원 이하 식당">1만원 이하</button>
          <button class="chip" data-query="도보 5분 이내 맛집">도보 5분</button>
        </div>
      </section>

      <section class="result">
        <div class="list">
          <div class="list-head"><h2 id="resultTitle">추천 3곳</h2><span class="sort">거리순</span></div>
          <div id="restaurants"></div>
          <p class="reason" id="reason">학교에서 가깝고 예산 안에서 빠르게 한 끼를 해결할 수 있는 식당을 골랐어요.</p>
        </div>

        <div class="map" aria-label="성균관대학교 명륜캠퍼스 주변 지도">
          <div class="park"></div><div class="road r1"></div><div class="road r2"></div><div class="road r3"></div>
          <div class="campus">성균관대학교 명륜캠퍼스</div>
          <button class="pin one" data-id="1" aria-label="성대 김밥 위치"></button>
          <button class="pin two" data-id="2" aria-label="명륜국밥 위치"></button>
          <button class="pin three" data-id="3" aria-label="혜화분식 위치"></button>
          <span class="map-note">실제 지도 API 연결 예정</span>
        </div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
