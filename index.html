<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>한입지도 — 맞춤 맛집 찾기</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="wrap">
      <header>
        <div class="logo">한입<b>지도</b></div>
        <div class="location">📍 내 주변의 맞춤 맛집</div>
      </header>

      <section class="hero">
        <h1>오늘, 어디서 먹을까?</h1>
        <p>원하는 장소와 조건을 문장으로 편하게 입력해 보세요.</p>
        <form class="search" id="searchForm">
          <input id="query" aria-label="맛집 검색 조건" placeholder="예: 8천원 이하 혼밥하기 좋은 곳" />
          <button type="button" id="shuffleBtn" class="shuffle" title="아무거나 한입 추천">🎲 아무거나</button>
          <button>추천받기</button>
        </form>
        <div class="chips category-chips">
          <button class="chip category-chip" data-category="cafeteria">🍚 학식</button>
          <button class="chip category-chip" data-category="nearby">🍽️ 주변 식당</button>
        </div>
        <div class="chips">
          <button class="chip" data-tag="lonely" data-query="혼밥하기 좋은 곳">혼밥</button>
          <button class="chip" data-tag="budget10k" data-query="1만원 이하 식당">1만원 이하</button>
          <button class="chip" data-tag="walk5" data-query="도보 5분 이내 맛집">도보 5분</button>
          <button class="chip" data-tag="exam247" data-query="시험기간에 24시간 여는 곳">#시험기간 24시</button>
          <button class="chip" data-tag="hangover" data-query="해장 필요한 얼큰한 국물">#해장필요</button>
          <button class="chip" data-tag="formal" data-query="교수님과 격식있게 식사">#교수님과식사</button>
          <button class="chip" data-tag="splurge" data-query="과선배가 사는 비싼 맛집">#과선배가사는날</button>
        </div>
        <div class="controls-row">
          <div class="recent" id="recentSearches"></div>
        </div>
      </section>

      <section class="result">
        <div class="list">
          <div class="list-head"><h2 id="resultTitle">추천 3곳</h2><span class="sort" id="sortLabel">거리순</span></div>
          <p id="aiInterpretNote" class="ai-note" hidden></p>
          <div id="restaurants"></div>
          <p class="reason" id="reason">학교에서 가깝고 예산 안에서 빠르게 한 끼를 해결할 수 있는 식당을 골랐어요.</p>
          <div class="directions-row">
            <a id="directionsLink" class="directions-btn" target="_blank" rel="noopener">🧭 앱으로 길찾기</a>
            <a id="directionsFallbackLink" class="directions-btn secondary" target="_blank" rel="noopener">🔍 지도에서 검색</a>
          </div>
        </div>

        <div class="map" aria-label="성균관대학교 명륜캠퍼스 주변 지도">
          <div id="map"></div>
        </div>
      </section>

      <section class="submit-section">
        <form id="submitForm" class="submit-form" hidden>
          <div class="submit-form-head">
            <h3>새 식당 제보 (사진 한 장이면 끝!)</h3>
            <button type="button" id="closeSubmitForm" class="submit-close" aria-label="제보 폼 닫기">✕</button>
          </div>

          <div class="field-row">
            <input id="subName" placeholder="식당 이름" required />
            <button type="button" id="lookupAddressBtn">주소 찾기</button>
          </div>
          <p id="subAddressPreview" class="address-preview"></p>

          <label class="photo-label" for="subMenuPhoto">📷 메뉴판 사진을 선택하면 메뉴를 자동으로 채워드려요</label>
          <input type="file" id="subMenuPhoto" accept="image/*" capture="environment" />
          <p id="extractStatus" class="address-preview"></p>

          <textarea id="subMenu" placeholder="메뉴명:가격 (한 줄에 하나씩)&#10;예) 김밥:2500&#10;라면:3500" required></textarea>

          <div class="tag-checks">
            <label><input type="checkbox" value="lonely" /> 혼밥</label>
            <label><input type="checkbox" value="budget10k" /> 1만원 이하</label>
            <label><input type="checkbox" value="walk5" /> 도보 5분</label>
            <label><input type="checkbox" value="exam247" /> 시험기간 24시</label>
            <label><input type="checkbox" value="hangover" /> 해장필요</label>
            <label><input type="checkbox" value="formal" /> 교수님과식사</label>
            <label><input type="checkbox" value="splurge" /> 과선배가사는날</label>
          </div>

          <div class="field-row hours-row">
            <label class="is24h-label"><input type="checkbox" id="subIs24h" /> 24시간 영업</label>
            <input id="subOpen" type="time" />
            <span>~</span>
            <input id="subClose" type="time" />
          </div>

          <textarea id="subReason" placeholder="한줄 추천 이유 (선택)"></textarea>
          <input id="subSubmittedBy" placeholder="제보자 이름/연락처 (선택)" />

          <button type="submit" class="submit-cta">제보하기</button>
          <p id="submitStatus" class="submit-status"></p>
        </form>
      </section>
    </main>
    <button type="button" id="fabSubmit" class="fab-submit" title="메뉴판 사진으로 제보하기">📷 맛집 제보하기</button>
    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=25drbmx21q"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="app.js"></script>
  </body>
</html>
